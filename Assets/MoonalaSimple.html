<script>

    function initParticles() {
        const canvas = document.getElementById('particles');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const particles = [];
        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.vx = (Math.random() - 0.5) * 0.5;
                this.vy = (Math.random() - 0.5) * 0.5;
                this.radius = Math.random() * 2;
          this.alpha = Math.random() * 0.4 + 0.1; // Range: 0.1-0.5

            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                if (this.x < 0 || this.x > canvas.width ||
                    this.y < 0 || this.y > canvas.height) {
                    this.reset();
                }
            }

            draw() {
                ctx.fillStyle = `rgba(173, 216, 230, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 100; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();
    }

    function updateDateTime() {
        const now = new Date();
        document.getElementById('time').textContent =
            now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
        document.getElementById('date').textContent =
            now.toLocaleDateString('en-US', {
                weekday: 'long',
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
    }

// Use this function to show a modal with a question and two choices.

function showLunarConfirm(message, primaryText = 'Make secured (https)?', secondaryText = 'Continue Unsecured') {
    return new Promise((resolve) => {
        // Create overlay
        const overlay = document.createElement('div');
        overlay.setAttribute('role', 'dialog');
        overlay.setAttribute('aria-modal', 'true');
        overlay.style.position = 'fixed';
        overlay.style.inset = '0';
        overlay.style.display = 'flex';
        overlay.style.alignItems = 'center';
        overlay.style.justifyContent = 'center';
        overlay.style.zIndex = '2147483647'; // max z-index to be above everything
        overlay.style.backdropFilter = 'blur(6px)'; // subtle blur
        overlay.style.webkitBackdropFilter = 'blur(6px)';

        // Semi-opaque lunar background (black + faint glow)
        overlay.style.background = 'linear-gradient(0deg, rgba(0,0,0,0.72), rgba(0,0,0,0.48))';

        // Modal container
        const modal = document.createElement('div');
        modal.style.minWidth = '320px';
        modal.style.maxWidth = '680px';
        modal.style.borderRadius = '12px';
        modal.style.padding = '20px';
        modal.style.boxSizing = 'border-box';
        modal.style.boxShadow = '0 8px 40px rgba(0,0,0,0.8), 0 0 18px rgba(0,188,255,0.06) inset';
        modal.style.background = '#050608'; // near-black panel
        modal.style.color = '#ffffff';
        modal.style.fontFamily = 'system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial';
        modal.style.display = 'flex';
        modal.style.flexDirection = 'column';
        modal.style.gap = '14px';
        modal.style.border = '1px solid rgba(0,188,255,0.12)';

        // Top row: icon + title
        const topRow = document.createElement('div');
        topRow.style.display = 'flex';
        topRow.style.alignItems = 'center';
        topRow.style.gap = '12px';

        // Moon icon (SVG)
        const moon = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        moon.setAttribute('viewBox', '0 0 24 24');
        moon.setAttribute('aria-hidden', 'true');
        moon.style.width = '36px';
        moon.style.height = '36px';
        moon.innerHTML = `
            <defs>
                <radialGradient id="g" cx="30%" cy="20%">
                    <stop offset="0%" stop-color="#00bcff" stop-opacity="0.9"/>
                    <stop offset="70%" stop-color="#0a3040" stop-opacity="0.6"/>
                    <stop offset="100%" stop-color="#000000" stop-opacity="0.2"/>
                </radialGradient>
            </defs>
            <circle cx="12" cy="12" r="10" fill="url(#g)"></circle>
            <path d="M17 8c-1.8 0-3.4.8-4.5 2.2C12.2 8.7 9.4 7.7 6.9 8.2 9.2 5.2 13.5 4 17 8z" fill="rgba(0,0,0,0.12)"></path>
        `;

        // Title + subtitle
        const titleBox = document.createElement('div');
        titleBox.style.display = 'flex';
        titleBox.style.flexDirection = 'column';
        titleBox.style.gap = '4px';

        const title = document.createElement('div');
        title.textContent = 'Unsecure link detected';
        title.style.fontSize = '16px';
        title.style.fontWeight = '700';
        title.style.letterSpacing = '0.2px';
        title.style.color = '#ffffff';

        const subtitle = document.createElement('div');
        subtitle.textContent = message;
        subtitle.style.fontSize = '13px';
        subtitle.style.opacity = '0.88';
        subtitle.style.maxWidth = '520px';
        subtitle.style.lineHeight = '1.35';
        subtitle.style.color = '#e6f7ff';

        topRow.appendChild(moon);
        titleBox.appendChild(title);
        titleBox.appendChild(subtitle);
        topRow.appendChild(titleBox);

        // Buttons row
        const buttonsRow = document.createElement('div');
        buttonsRow.style.display = 'flex';
        buttonsRow.style.justifyContent = 'flex-end';
        buttonsRow.style.gap = '10px';
        buttonsRow.style.marginTop = '4px';

        // Secondary (cancel-like) button
        const secondary = document.createElement('button');
        secondary.type = 'button';
        secondary.textContent = secondaryText;
        secondary.style.padding = '8px 12px';
        secondary.style.borderRadius = '8px';
        secondary.style.fontSize = '13px';
        secondary.style.cursor = 'pointer';
        secondary.style.border = '1px solid rgba(255,255,255,0.06)';
        secondary.style.background = 'transparent';
        secondary.style.color = '#dbeeff';
        secondary.style.outline = 'none';
        secondary.style.minWidth = '140px';
        secondary.setAttribute('aria-label', secondaryText);
        secondary.tabIndex = 0;

        // Primary (yes) button - neon blue accent
        const primary = document.createElement('button');
        primary.type = 'button';
        primary.textContent = primaryText;
        primary.style.padding = '8px 14px';
        primary.style.borderRadius = '10px';
        primary.style.fontSize = '13px';
        primary.style.cursor = 'pointer';
        primary.style.border = 'none';
        primary.style.minWidth = '160px';
        primary.style.background = 'linear-gradient(90deg, rgba(0,188,255,0.14), rgba(0,188,255,0.06))';
        primary.style.boxShadow = '0 6px 18px rgba(0,188,255,0.12), 0 0 8px rgba(0,188,255,0.06) inset';
        primary.style.color = '#c5f6ff';
        primary.style.fontWeight = '700';
        primary.setAttribute('aria-label', primaryText);
        primary.tabIndex = 0;

        // Close icon (small X in corner)
        const closeBtn = document.createElement('button');
        closeBtn.type = 'button';
        closeBtn.innerHTML = '&#x2715;';
        closeBtn.setAttribute('aria-label', 'Close dialog');
        closeBtn.style.position = 'absolute';
        closeBtn.style.right = '12px';
        closeBtn.style.top = '12px';
        closeBtn.style.background = 'transparent';
        closeBtn.style.border = 'none';
        closeBtn.style.color = '#8fbfdc';
        closeBtn.style.fontSize = '14px';
        closeBtn.style.cursor = 'pointer';
        closeBtn.style.padding = '4px';
        closeBtn.tabIndex = 0;

        // Append elements
        modal.appendChild(closeBtn);
        modal.appendChild(topRow);
        buttonsRow.appendChild(secondary);
        buttonsRow.appendChild(primary);
        modal.appendChild(buttonsRow);
        overlay.appendChild(modal);
        document.body.appendChild(overlay);

        // Focus management
        primary.focus();

        // Helper to cleanup DOM + listeners
        function cleanup(result) {
            // remove listeners and DOM nodes
            document.body.removeChild(overlay);
            document.removeEventListener('keydown', keyHandler);
            resolve(result);
        }

        // Click handlers
        primary.addEventListener('click', () => cleanup(true));
        secondary.addEventListener('click', () => cleanup(false));
        closeBtn.addEventListener('click', () => cleanup(false));
        overlay.addEventListener('click', (ev) => {
            // close if click outside modal box
            if (ev.target === overlay) cleanup(false);
        });

        // Keyboard support: Enter accepts primary, Escape cancels
        function keyHandler(e) {
            if (e.key === 'Escape') {
                e.preventDefault();
                cleanup(false);
            } else if (e.key === 'Enter') {
                // if focus is in a button or anywhere, treat Enter as primary
                e.preventDefault();
                cleanup(true);
            } else if (e.key === 'Tab') {
                // Simple focus trap (cycle between primary and secondary and close)
                const focusables = [primary, secondary, closeBtn];
                const idx = focusables.indexOf(document.activeElement);
                if (e.shiftKey) {
                    // shift+tab
                    const next = idx > 0 ? focusables[idx - 1] : focusables[focusables.length - 1];
                    next.focus();
                    e.preventDefault();
                } else {
                    const next = idx >= 0 && idx < focusables.length - 1 ? focusables[idx + 1] : focusables[0];
                    next.focus();
                    e.preventDefault();
                }
            }
        }
        document.addEventListener('keydown', keyHandler);
    });
}
document.getElementById('searchInput').addEventListener('keypress', async (e) => {
    if (e.key === 'Enter') {
        const spinner = document.getElementById('spinner');
        const rawValue = e.target.value.trim();
        if (spinner) spinner.style.display = 'block';

        // Regex to detect a ".TLD" at end of domain or before a slash
        const urlPattern = /\.[a-z]{2,}(?:\/|$)/i;

        if (urlPattern.test(rawValue)) {
            // Input looks like a URL
            if (/^https:\/\//i.test(rawValue)) {
                // Already https, just open it
                window.open(rawValue, '_self');
            } else if (/^http:\/\//i.test(rawValue) || !/^https?:\/\//i.test(rawValue)) {
                // Either http:// or no protocol at all, show in-page confirmation modal
                const message = 'This link is not secure. Would you like to convert it to HTTPS before opening?';
                try {
                    const useHttps = await showLunarConfirm(message, 'Make secured (https)', 'Continue Unsecured');

                    if (useHttps) {
                        // User wants https, so replace or prepend https://
                        let httpsUrl = rawValue;
                        if (/^http:\/\//i.test(rawValue)) {
                            httpsUrl = rawValue.replace(/^http:\/\//i, 'https://');
                        } else {
                            httpsUrl = 'https://' + rawValue;
                        }
                        window.open(httpsUrl, '_self');
                    } else {
                        // User declined (unsecured) — ensure http:// is prepended
                        let httpUrl = rawValue;
                        if (!/^http:\/\//i.test(httpUrl)) {
                            httpUrl = 'http://' + httpUrl;
                        }
                        window.open(httpUrl, '_self');
                    }
                } catch (err) {
                    // Fallback behaviour: open with http:// if no scheme
                    let fallbackUrl = rawValue;
                    if (!/^https?:\/\//i.test(fallbackUrl)) {
                        fallbackUrl = 'http://' + fallbackUrl;
                    }
                    window.open(fallbackUrl, '_self');
                }
            } else {
                // Some other case, just open rawValue
                window.open(rawValue, '_self');
            }
        } else {
            // Not a URL, "plant a tree" case - just search on Ecosia
            const query = encodeURIComponent(rawValue);
            const urlToOpen = `https://www.mojeek.com/?q=${query}`;
            window.open(urlToOpen, '_self');
        }

        // Hide spinner later (kept original behavior)
        setTimeout(() => {
            if (spinner) spinner.style.display = 'none';
        }, 19000);
    }
});

            } else {

    closeBtn.innerHTML = '×';
    closeBtn.style.position = 'absolute';
    closeBtn.style.top = '10px';
    closeBtn.style.right = '15px';
    closeBtn.style.color = 'var(--accent-neon)';
    closeBtn.style.fontSize = '34px';
    closeBtn.style.cursor = 'pointer';
    closeBtn.style.transition = 'var(--transition-speed)';
    closeBtn.title = 'Close calculator';
    closeBtn.setAttribute('role', 'button');
    closeBtn.setAttribute('aria-label', 'Close calculator');

 
    closeBtn.addEventListener('mouseenter', () => {
        closeBtn.style.transform = 'rotate(90deg) scale(1.2)';
    });
    closeBtn.addEventListener('mouseleave', () => {
        closeBtn.style.transform = 'rotate(0deg) scale(1)';
    });

 
    closeBtn.addEventListener('click', () => {
        calculatorVisible = false;
        calculatorPopup.style.display = 'none';
    });

    closeBtn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        closeBtn.style.transform = 'scale(0.9)';
    });
    closeBtn.addEventListener('touchend', (e) => {
        e.preventDefault();
        closeBtn.style.transform = 'scale(1)';
        calculatorVisible = false;
        calculatorPopup.style.display = 'none';
    });

    calculatorPopup.prepend(closeBtn);
}
